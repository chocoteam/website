baseURL = "https://choco-solver.org/"
title = "Choco-solver"
description = "A Java library for Constraint Programming"

# --- Configuration Générale ---
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true
theme = ["docsy"]

disableKinds = ["taxonomy", "term", "RSS"]

# --- Gestion des Langues ---
# On définit l'anglais explicitement pour mapper le dossier content/en
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    title = "Choco-solver"
    description = "A Java library for Constraint Programming"
    label = "English"
    contentDir = "content/en"
    weight = 1

    # On place les menus ici pour une meilleure compatibilité Docsy/Multilingue (futur)
    [[languages.en.menu.main]]
      name = "FAQ"
      weight = 40
      url = "docs/frequently-asked-questions/"

    [[languages.en.menu.main]]
      name = "Javadoc"
      weight = 50
      url = "https://javadoc.io/doc/org.choco-solver/choco-solver/latest/org.chocosolver/module-summary.html"

[taxonomies]
  category = ""
  tag = ""

# --- Rendu Markdown & Coloration (Moderne) ---
[markup]
  [markup.goldmark.renderer]
    unsafe = true # Nécessaire pour inclure du HTML brut dans le Markdown
  [markup.highlight]
    codeFences = true
    style = "monokai"
    noClasses = true # Équivalent à pygmentsUseClasses = false

# --- Paramètres spécifiques à Docsy ---
[params]
  copyright = "The Choco-solver Authors"
  privacy_policy = "https://policies.google.com/privacy"
  choco_version = "6.0.0"
  version_menu = "Releases"

  # Repository configuration
  github_repo = "https://github.com/chocoteam/website"
  github_project_repo = "https://github.com/chocoteam/choco-solver"
  github_branch = "master"

  # Search
  gcs_engine_id = "002090051099228186981:fjdyae7kf1k"
  offlineSearch = false
  algolia_docsearch = false

  [params.author]
    name = "Charles Prud'homme"
    email = "charles.prudhomme@imt-atlantique.fr"

  [params.ui]
    sidebar_menu_compact = false
    breadcrumb_disable = false
    sidebar_search_disable = true
    navbar_logo = true
    footer_about_enable = true
    bootstrap_version = 5

  [params.ui.feedback]
    enable = true
    yes = 'Glad to hear it! Please <a href="https://github.com/chocoteam/choco-solver/issues/new">tell us how we can improve</a>.'
    no = 'Sorry to hear that. Please <a href="https://github.com/chocoteam/choco-solver/issues/new">tell us how we can improve</a>.'

  [params.links]
    [[params.links.user]]
      name = "Stack Overflow"
      url = "https://stackoverflow.com/questions/tagged/choco"
      icon = "fab fa-stack-overflow"
      desc = "Practical questions and curated answers"
    [[params.links.user]]
      name = "Discord"
      url = "https://discord.gg/aH6zxa7e64"
      icon = "fab fa-discord"
      desc = "Chat with other project users and developers"
    [[params.links.user]]
      name = "GitHub"
      url = "https://github.com/chocoteam/choco-solver"
      icon = "fab fa-github"
      desc = "Development takes place here!"

# --- Google Analytics 4 ---
[services]
  [services.googleAnalytics]
    id = "G-738NJHH4T5"

# --- Modules ---
[module]
  [module.hugoVersion]
    extended = true
    min = "0.75.0"
  [[module.imports]]
    path = "github.com/google/docsy"
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"

# --- Divers ---
time_format_default = "02.01.2006"